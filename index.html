<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Pedidos - Herbalife Premium</title>
    <style>
        :root {
            --primary: #78be20; /* Verde Herbalife */
            --primary-dark: #5a8f18;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 100px;
        }

        header {
            background: white;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* --- BUSCA --- */
        .search-container {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 1rem;
            box-shadow: var(--shadow);
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(120, 190, 32, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        /* --- SELETOR DE UF --- */
        .uf-selector-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }

        .tax-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        /* --- BARRA DE PROGRESSO --- */
        .progression-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .pv-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 0.75rem;
        }

        .pv-current {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .pv-target {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: right;
        }

        .progress-track {
            height: 12px;
            background: var(--bg);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a3e635);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- GRID DE PRODUTOS --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            padding: 1.25rem;
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .sku-tag {
            font-size: 0.7rem;
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 700;
            margin: 0.5rem 0;
            display: block;
            height: 2.5rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-pv {
            color: var(--primary);
            font-weight: 700;
            font-size: 0.875rem;
        }

        /* --- TABELA DE PREÇOS NO CARD --- */
        .price-table {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-top: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .price-col {
            text-align: center;
            padding: 4px;
            border-radius: 6px;
        }

        .price-col span {
            display: block;
        }

        .price-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .price-value {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .price-col.active {
            background: rgba(120, 190, 32, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .price-col.active .price-label { color: var(--primary); }

        /* --- BOTÕES DE AÇÃO --- */
        .card-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .qty-input {
            width: 60px;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }

        .add-btn {
            flex: 1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: var(--primary-dark);
        }

        /* --- CARRINHO FLUTUANTE --- */
        .cart-float-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 99px;
            box-shadow: 0 8px 32px rgba(120, 190, 32, 0.4);
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            transition: transform 0.2s;
        }

        .cart-float-btn:hover {
            transform: scale(1.05);
        }

        .cart-badge {
            background: white;
            color: var(--primary);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        /* --- DRAWER DO CARRINHO --- */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            backdrop-filter: blur(4px);
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: white;
            z-index: 1001;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        .add-more-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 0.75rem;
            border-radius: 12px;
            font-weight: 700;
            margin-bottom: 0.5rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .clear-cart-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 12px;
            font-weight: 700;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        .cart-summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.25rem;
            font-weight: 800;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--border);
            color: var(--primary);
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
            .cart-float-btn {
                bottom: 1rem;
                right: 1rem;
                padding: 0.75rem 1rem;
            }
        }
        /* Loading Spinner */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Simulador de Pedidos Herbalife</h1>
    </header>

    <main class="container">
        
        <!-- SELETOR DE UF -->
        <section class="uf-selector-card">
            <div class="tax-group">
                <label class="tax-label">Estado (UF) para Preços</label>
                <select id="ufSelector" class="qty-input" style="width: 100%; height: 45px; background: #fff; cursor: pointer;">
                    <!-- Populado via JS -->
                </select>
            </div>
        </section>

        <!-- BARRA DE BUSCA -->
        <section class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nome ou SKU do produto...">
        </section>

        <!-- BARRA DE PROGRESSÃO PV -->
        <section class="progression-card">
            <div class="pv-info">
                <div>
                    <span class="tax-label">Pontos de Volume (PV)</span>
                    <div id="pvAtual" class="pv-current">0.00</div>
                </div>
                <div id="proximoNivel" class="pv-target">
                    Carregando progresso...
                </div>
            </div>
            <div class="progress-track">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </section>

        <!-- GRID DE PRODUTOS -->
        <div id="listaProdutos" class="product-grid">
            <!-- Cards gerados via JS -->
        </div>

    </main>

    <!-- CARRINHO FLUTUANTE -->
    <div id="cartFloatBtn" class="cart-float-btn">
        <span>🛒</span>
        <span>Carrinho</span>
        <div id="cartBadge" class="cart-badge">0</div>
    </div>

    <!-- DRAWER DO CARRINHO -->
    <div id="cartOverlay" class="cart-overlay"></div>
    <div id="cartDrawer" class="cart-drawer">
        <div class="cart-header">
            <h2 style="font-weight: 800; color: var(--primary);">Seu Pedido</h2>
            <button id="closeCart" style="background:none; border:none; font-size: 1.5rem; cursor:pointer; color: var(--text-muted);">✕</button>
        </div>
        
        <div id="itensCarrinho" class="cart-items">
            <!-- Itens do carrinho aqui -->
        </div>

        <div class="cart-footer">
            <button id="addMoreProducts" class="add-more-btn">
                <span>➕</span> Adicionar mais produtos
            </button>
            <button id="limparCarrinho" class="clear-cart-btn">Limpar Carrinho</button>
            
            <div class="cart-summary-row">
                <span>Subtotal (Tabela)</span>
                <span id="resumoSubtotal">R$ 0,00</span>
            </div>
            <div class="cart-summary-row">
                <span>Total PV</span>
                <span id="resumoPV" style="font-weight: 700; color: var(--primary);">0.00</span>
            </div>
            <div class="cart-summary-row">
                <span>Desconto Ativo</span>
                <span id="resumoDesconto">25%</span>
            </div>
            
            <div id="totalFinal" class="cart-total-row">
                <span>Total Final</span>
                <span id="resumoTotal">R$ 0,00</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
