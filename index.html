<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Pedidos - Herbalife Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Simulador de Pedidos Herbalife</h1>
    </header>

    <main class="container">
        
        <!-- SELETOR DE UF E ALÍQUOTAS -->
        <section class="tax-selector">
            <div class="tax-group">
                <label class="tax-label">Estado (UF) para Preços</label>
                <select id="ufSelector" class="qty-input" style="width: 100%; height: 45px; margin-bottom: 1.5rem; background: #fff; cursor: pointer;">
                    <!-- Populado via JS -->
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="tax-group">
                    <label class="tax-label">Alíquota IPI</label>
                    <div class="tax-buttons" id="ipiButtons">
                        <button class="tax-btn active" data-value="0.05">5%</button>
                        <button class="tax-btn" data-value="0.13">13%</button>
                        <button class="tax-btn" data-value="0.21">21%</button>
                        <button class="tax-btn" data-value="0.29">29%</button>
                    </div>
                </div>

                <div class="tax-group">
                    <label class="tax-label">Alíquota ICMS ST</label>
                    <div class="tax-buttons" id="icmsButtons">
                        <button class="tax-btn active" data-value="0.09">9%</button>
                        <button class="tax-btn" data-value="0.17">17%</button>
                        <button class="tax-btn" data-value="0.25">25%</button>
                        <button class="tax-btn" data-value="0.33">33%</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- BARRA DE PROGRESSÃO PV -->
        <section class="progression-card">
            <div class="pv-info">
                <div>
                    <span class="tax-label">Pontos de Volume (PV)</span>
                    <div id="pvAtual" class="pv-current">0.00</div>
                </div>
                <div id="proximoNivel" class="pv-target">
                    Faltam 500.00 PV para 35%
                </div>
            </div>
            <div class="progress-track">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </section>

        <!-- GRID DE PRODUTOS -->
        <div id="listaProdutos" class="product-grid">
            <!-- Cards gerados via JS -->
        </div>

    </main>

    <!-- CARRINHO FLUTUANTE -->
    <div id="cartFloatBtn" class="cart-float-btn">
        <span>🛒</span>
        <span>Carrinho</span>
        <div id="cartBadge" class="cart-badge">0</div>
    </div>

    <!-- DRAWER DO CARRINHO -->
    <div id="cartOverlay" class="cart-overlay"></div>
    <div id="cartDrawer" class="cart-drawer">
        <div class="cart-header">
            <h2 style="font-weight: 800; color: var(--primary);">Seu Pedido</h2>
            <button id="closeCart" style="background:none; border:none; font-size: 1.5rem; cursor:pointer; color: var(--text-muted);">✕</button>
        </div>
        
        <div id="itensCarrinho" class="cart-items">
            <!-- Itens do carrinho aqui -->
        </div>

        <div class="cart-footer">
            <button id="limparCarrinho" class="clear-cart-btn">Limpar Carrinho</button>
            
            <div class="cart-summary-row">
                <span>Subtotal (Base)</span>
                <span id="resumoSubtotal">R$ 0,00</span>
            </div>
            <div class="cart-summary-row">
                <span>Total PV</span>
                <span id="resumoPV" style="font-weight: 700; color: var(--primary);">0.00</span>
            </div>
            <div class="cart-summary-row">
                <span>Desconto Aplicado</span>
                <span id="resumoDesconto">0%</span>
            </div>
            <div class="cart-summary-row" style="font-size: 0.8rem; color: var(--text-muted);">
                <span>Impostos (IPI + ST)</span>
                <span id="resumoImpostos">R$ 0,00</span>
            </div>
            
            <div id="totalFinal" class="cart-total-row" style="padding-top: 1rem; border-top: 2px solid var(--border); margin-top: 1rem;">
                <span>Total Final</span>
                <span id="resumoTotal">R$ 0,00</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
